<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>影片連結產生器</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Bebas+Neue&display=swap');

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d0d0d;
  --card:#141414;
  --border:#2a2a2a;
  --accent:#e8ff00;
  --accent2:#ff4040;
  --text:#f0f0f0;
  --muted:#555;
  --mono:'IBM Plex Mono',monospace;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:32px 20px;
}

body::before{
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;opacity:.4;
}

.wrap{
  position:relative;z-index:1;
  width:100%;max-width:640px;
  display:flex;flex-direction:column;gap:32px;
}

.title-block{display:flex;flex-direction:column;gap:4px;}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(48px,10vw,80px);
  letter-spacing:.04em;line-height:.9;
  color:var(--accent);
}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:4px;
  padding:28px;
  display:flex;flex-direction:column;gap:20px;
}

.field{display:flex;flex-direction:column;gap:8px;}
label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}

.seg{
  display:flex;
  border:1px solid var(--border);
  border-radius:3px;overflow:hidden;
}
.seg button{
  flex:1;background:none;border:none;
  color:var(--muted);font-family:var(--mono);font-size:12px;
  padding:9px 14px;cursor:pointer;transition:all .15s;
  border-right:1px solid var(--border);
}
.seg button:last-child{border-right:none;}
.seg button.active{background:var(--accent);color:#000;font-weight:600;}
.seg button:not(.active):hover{color:var(--text);background:var(--border);}

input[type=text]{
  width:100%;background:var(--bg);
  border:1px solid var(--border);border-radius:3px;
  padding:11px 14px;color:var(--text);
  font-family:var(--mono);font-size:13px;
  outline:none;transition:border-color .15s;
}
input[type=text]:focus{border-color:var(--accent);}
input[type=text]::placeholder{color:var(--muted);}

.generate-btn{
  background:var(--accent);color:#000;border:none;border-radius:3px;
  padding:13px;font-family:'Bebas Neue',sans-serif;font-size:20px;
  letter-spacing:.1em;cursor:pointer;transition:opacity .15s;
}
.generate-btn:hover{opacity:.85;}

.result{display:none;flex-direction:column;gap:16px;}
.result.show{display:flex;}

.result-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}

.bbcode-box{
  background:var(--bg);border:1px solid var(--border);
  border-radius:3px;padding:12px 14px;font-size:12px;
  color:#888;word-break:break-all;line-height:1.6;
}
.bbcode-box span{color:var(--accent2);}

.btn-row{display:flex;gap:8px;}

.copy-btn{
  flex:1;background:none;border:1px solid var(--border);
  border-radius:3px;padding:10px;color:var(--muted);
  font-family:var(--mono);font-size:11px;cursor:pointer;
  transition:all .15s;letter-spacing:.06em;text-align:center;
}
.copy-btn:hover{border-color:var(--text);color:var(--text);}
.copy-btn.copied{border-color:var(--accent);color:var(--accent);}

.goto-btn{
  flex:1;background:var(--accent);color:#000;border:none;
  border-radius:3px;padding:10px;font-family:var(--mono);
  font-size:11px;font-weight:600;cursor:pointer;
  text-align:center;text-decoration:none;
  display:block;letter-spacing:.06em;transition:opacity .15s;
}
.goto-btn:hover{opacity:.85;}

.divider{height:1px;background:var(--border);}

.how{display:flex;flex-direction:column;gap:10px;}
.step{display:flex;gap:14px;align-items:flex-start;font-size:12px;line-height:1.6;color:var(--muted);}
.step-num{
  font-family:'Bebas Neue',sans-serif;font-size:22px;
  color:var(--border);line-height:1;min-width:20px;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="title-block">
    <h1>VIDLINK</h1>
    <div class="subtitle">影片播放連結產生器</div>
  </div>

  <div class="card">
    <div class="field">
      <label>影片來源</label>
      <div class="seg">
        <button class="active" id="btn-cb" onclick="setSource('cb')">Catbox</button>
        <button id="btn-url" onclick="setSource('url')">直接 URL</button>
      </div>
    </div>

    <div class="field">
      <label id="input-label">Catbox 檔名（含副檔名）</label>
      <input type="text" id="vidInput" placeholder="例：abc123.mp4">
    </div>

    <button class="generate-btn" onclick="generate()">產生播放連結</button>

    <div class="result" id="result">
      <div class="divider"></div>

      <div>
        <div class="result-label" style="margin-bottom:8px">論壇 BBCode</div>
        <div class="bbcode-box" id="bbcodeBox"></div>
      </div>

      <div class="btn-row">
        <button class="copy-btn" id="copyBbcode" onclick="copyBbcode()">複製 BBCode</button>
        <a class="goto-btn" id="previewLink" href="#" target="_blank">前往播放器觀看 ↗</a>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="result-label">使用說明</div>
    <div class="how">
      <div class="step"><div class="step-num">1</div><div>上傳影片到 Catbox 或影音圖床，取得檔案 ID 或網址</div></div>
      <div class="step"><div class="step-num">2</div><div>在上方輸入 ID，點「產生播放連結」</div></div>
      <div class="step"><div class="step-num">3</div><div>複製 BBCode，貼到論壇發文即可嵌入播放</div></div>
    </div>
  </div>

</div>

<script>
let source = 'cb';
let playerUrl = '';

// ★ 上傳到 GitHub Pages 後，把下面改成你的實際網址
// 例如：'https://yourname.github.io/vidlink'
const SITE_BASE = '';

const BASE = SITE_BASE || location.href.replace(/\/?(?:index\.html)?(\?.*)?$/, '');

function setSource(s) {
  source = s;
  document.querySelectorAll('.seg button').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + s).classList.add('active');
  const label = document.getElementById('input-label');
  const input = document.getElementById('vidInput');
  if (s === 'cb') {
    label.textContent = 'Catbox 檔名（含副檔名）';
    input.placeholder = '例：abc123.mp4';
  } else {
    label.textContent = '影片直連 URL';
    input.placeholder = '例：https://files.catbox.moe/xxx.mp4';
  }
  document.getElementById('result').classList.remove('show');
}

function generate() {
  const val = document.getElementById('vidInput').value.trim();
  if (!val) { alert('請輸入檔名或網址'); return; }

  playerUrl = `${BASE}/player/?src=${encodeURIComponent(source)}&id=${encodeURIComponent(val)}`;

  document.getElementById('bbcodeBox').innerHTML =
    `<span>[xmp4]</span>${playerUrl}<span>[/xmp4]</span>`;
  document.getElementById('previewLink').href = playerUrl;
  document.getElementById('result').classList.add('show');
}

function copyBbcode() {
  const text = `[xmp4]${playerUrl}[/xmp4]`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBbcode');
    btn.textContent = '✓ 已複製';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '複製 BBCode'; btn.classList.remove('copied'); }, 1800);
  });
}

document.getElementById('vidInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') generate();
});
</script>
</body>
</html>
